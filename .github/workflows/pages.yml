name: Build & Deploy Resume

on:
  push:
    branches: ["master"]   
    
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp style.css dist/style.css

      - name: Build HTML
        uses: docker://pandoc/latex:latest
        with:
          args: >
            resume.md
            --standalone
            --css style.css
            -o dist/index.html

      - name: Build PDF
        uses: docker://pandoc/latex:latest
        with:
          args: >
            resume.md
            -o dist/resume.pdf
            --pdf-engine=xelatex
            -V geometry:margin=1in

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
