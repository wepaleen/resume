name: Build & Deploy Resume (EN + RU)

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist dist/ru
          cp style.css dist/style.css
          cp style.css dist/ru/style.css

      # EN -> /
      - name: Build HTML (EN)
        uses: docker://pandoc/latex:latest
        with:
          args: >
            resume.en.md
            --standalone
            --css style.css
            -o dist/index.html

      - name: Build PDF (EN)
        uses: docker://pandoc/latex:latest
        with:
          args: >
            resume.en.md
            -o dist/resume.pdf
            --pdf-engine=xelatex
            -V geometry:margin=1in

      # RU -> /ru/
      - name: Build HTML (RU)
        uses: docker://pandoc/latex:latest
        with:
          args: >
            resume.ru.md
            --standalone
            --css style.css
            -o dist/ru/index.html

      - name: Build PDF (RU)
        uses: docker://pandoc/latex:latest
        with:
          args: >
            resume.ru.md
            -o dist/ru/resume.pdf
            --pdf-engine=xelatex
            -V geometry:margin=1in

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
